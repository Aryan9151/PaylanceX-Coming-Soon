<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#03060f" />

    <!-- Primary Meta Tags -->
    <title>PaylanceX</title>
    <meta name="title" content="PaylanceX" />
    <meta
      name="description"
      content="PaylanceX is building thoughtful, reliable, and future-ready technology. Something extraordinary is coming — the future of digital experiences, launching soon."
    />
    <meta name="author" content="Aryan Gupta, Founder & CEO of PaylanceX" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="application-name" content="PaylanceX" />
    <meta name="apple-mobile-web-app-title" content="PaylanceX" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="origin-when-cross-origin" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PaylanceX" />
    <meta property="og:url" content="https://paylancex.com/" />
    <meta property="og:title" content="PaylanceX" />
    <meta
      property="og:description"
      content="PaylanceX is building thoughtful, reliable, and future-ready technology. Something extraordinary is coming — the future of digital experiences, launching soon."
    />
    <meta property="og:image" content="https://paylancex.com/logo.png" />
    <meta property="og:image:alt" content="PaylanceX logo" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://paylancex.com/" />
    <meta name="twitter:title" content="PaylanceX" />
    <meta
      name="twitter:description"
      content="PaylanceX is building thoughtful, reliable, and future-ready technology. Something extraordinary is coming — the future of digital experiences, launching soon."
    />
    <meta name="twitter:image" content="https://paylancex.com/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://paylancex.com/" />

    <!-- Favicon icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Performance: preconnect to font origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PaylanceX",
        "url": "https://paylancex.com",
        "logo": "https://paylancex.com/logo.png",
        "description": "PaylanceX is a technology company building thoughtful, reliable, and future-ready products.",
        "founder": {
          "@type": "Person",
          "name": "Aryan Gupta",
          "jobTitle": "Founder & CEO"
        },
        "sameAs": ["https://www.linkedin.com/in/aryan-gupta-823b74252"]
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PaylanceX",
        "alternateName": "PaylanceX",
        "url": "https://paylancex.com"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
