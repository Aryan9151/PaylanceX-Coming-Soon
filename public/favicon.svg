<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0070f0"/>
      <stop offset="100%" stop-color="#1a8cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0070f0" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- White background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border ring -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#0070f0" stroke-width="3" opacity="0.15"/>
  <!-- P letter -->
  <text x="256" y="350" font-family="Space Grotesk, Arial, sans-serif" font-size="300" font-weight="700" text-anchor="middle" fill="url(#letter)" filter="url(#shadow)">P</text>
</svg>
